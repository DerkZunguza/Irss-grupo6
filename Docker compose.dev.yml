services:

  mongo:
    image: mongo:7
    container_name: projeto-mongo
    restart: unless-stopped
    networks:
      - traefik-public
    # NÃO expõe porta em produção — apenas API acessa internamente
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: projeto-api
    restart: unless-stopped
    networks:
      - traefik-public
    # NÃO expõe porta — frontend acessa via Docker DNS
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/projetodb?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: projeto-frontend
    restart: unless-stopped
    networks:
      - traefik-public
    # NÃO expõe porta — Traefik gerencia
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.projeto.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.projeto.entrypoints=websecure"
      - "traefik.http.routers.projeto.tls.certresolver=letsencrypt"
      - "traefik.http.services.projeto.loadbalancer.server.port=80"

volumes:
  mongo-data:

networks:
  traefik-public:
    external: true   # Criada externamente: docker network create traefik-public
