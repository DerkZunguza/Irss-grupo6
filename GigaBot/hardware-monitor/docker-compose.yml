# docker-compose.yml — Sistema de monitoramento ESP32-S3 + Arduino SIM900
# Adiciona os serviços PostgreSQL e Flask ao stack existente
version: '3.9'

services:

  # ── Banco de dados PostgreSQL ───────────────────────────────────────────────
  postgres-hw:
    image: postgres:16-alpine
    container_name: hardware-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-hardware}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hardware123}
      POSTGRES_DB:       ${DB_NAME:-hardware_monitor}
    volumes:
      - postgres-hw-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hardware} -d ${DB_NAME:-hardware_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hardware-net

  # ── Backend Flask (API REST) ────────────────────────────────────────────────
  hardware-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hardware-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_USER:          ${DB_USER:-hardware}
      DB_PASSWORD:      ${DB_PASSWORD:-hardware123}
      DB_HOST:          postgres-hw
      DB_PORT:          5432
      DB_NAME:          ${DB_NAME:-hardware_monitor}
      # Caminho para o ficheiro de IPs banidos no volume partilhado com nginx
      BLOCKED_IPS_FILE: /nginx-conf/blocked_ips.conf
    volumes:
      - nginx-conf:/nginx-conf          # volume partilhado com o nginx
    depends_on:
      postgres-hw:
        condition: service_healthy
    networks:
      - hardware-net

  # ── Frontend via Nginx customizado (com watcher de IPs) ─────────────────────
  hardware-frontend:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: hardware-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-conf:/etc/nginx                     # lê o blocked_ips.conf gerado pela API
    depends_on:
      - hardware-api
    networks:
      - hardware-net

  # ── Redis (fila de mensagens WhatsApp) ──────────────────────────────────────
  redis-wa:
    image: redis:7-alpine
    container_name: hardware-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-wa-data:/data
    networks:
      - hardware-net

  # ── Serviço WhatsApp (Baileys — pool de sessões paralelas) ──────────────────
  whatsapp-service:
    build:
      context: ../whatsapp-service
      dockerfile: Dockerfile
    container_name: hardware-whatsapp
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      POOL_SIZE:    ${WA_POOL_SIZE:-2}
      PORT:         3001
      REDIS_HOST:   redis-wa
      REDIS_PORT:   6379
      WEBHOOK_URL:  http://hardware-api:5000/api/whatsapp/incoming
      API_TOKEN:    ${WA_API_TOKEN:-token_secreto}
    volumes:
      - wa-sessions:/app/sessions-data              # persistir QR auth entre restarts
    depends_on:
      - redis-wa
      - hardware-api
    networks:
      - hardware-net

volumes:
  postgres-hw-data:
  nginx-conf:                                       # volume partilhado API ↔ Nginx
  redis-wa-data:
  wa-sessions:                                      # auth state Baileys (evita re-scan QR)

networks:
  hardware-net:
    driver: bridge
