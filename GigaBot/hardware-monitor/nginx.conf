# nginx.conf — Proxy reverso para frontend + API com banimento de IPs via BD

# ── IPs banidos carregados de ficheiro externo ────────────────────────────────
# O ficheiro é gerado pela API Flask (/api/banned-ips) e actualizado em tempo
# real — o watcher.sh no container nginx faz reload automático ao detectar mudanças.
geo $ip_banido {
    default 0;
    include /etc/nginx/blocked_ips.conf;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Bloquear IPs banidos ──────────────────────────────────────────────────
    if ($ip_banido) {
        return 403 '{"success":false,"data":null,"message":"Acesso bloqueado."}';
    }

    # Servir frontend estático
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API Flask
    location /api/ {
        proxy_pass         http://hardware-api:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy para health check
    location /health {
        proxy_pass http://hardware-api:5000/health;
    }
}
